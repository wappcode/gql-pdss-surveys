}

input BuildSurveyTargetAudienceInput {
  """Si se asigna un id actualiza el registro relacionado con ese id"""
  id: ID
  title: String!
  starts: DateTime
  ends: DateTime
  welcome: BuildSurveyContentInput
  farewell: BuildSurveyContentInput
